<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航 - LBN Tools</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e8e8e8;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 60px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 48px 0 40px;
        }

        .header .logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header .divider {
            width: 48px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin: 16px auto 0;
            opacity: 0.3;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 36px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .stats-bar span strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Grid */
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Card */
        .page-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .page-card .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .page-card .card-body {
            flex: 1;
        }

        .page-card .card-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .page-card .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .page-card .card-action {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .page-card:hover .card-action {
            opacity: 1;
            transform: translateX(0);
        }

        .page-card .card-action .arrow {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .page-card:hover .card-action .arrow {
            transform: translateX(3px);
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .empty-state .hint {
            font-size: 12px;
            opacity: 0.6;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 24px 16px 40px;
            }

            .header {
                padding: 32px 0 28px;
            }

            .header .logo {
                font-size: 28px;
            }

            .page-grid {
                grid-template-columns: 1fr;
            }

            .page-card .card-action {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">LBN Tools</div>
            <p class="subtitle">实用在线工具集</p>
            <div class="divider"></div>
            <div class="stats-bar" id="stats" style="margin-top: 20px;">
                <span>共 <strong id="pageCount">0</strong> 个工具</span>
            </div>
        </header>

        <!-- Page Grid -->
        <div class="page-grid" id="pageGrid"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        &copy; 2026 LBN Tools · 自动发现 <span id="footerCount">0</span> 个页面
    </footer>

    <!-- PAGE_LIST_START -->
    <script>
        var PAGE_LIST = [
            {
                "name": "json.html",
                "title": "JSON 工具",
                "description": "格式化、压缩、转义/去转义 JSON 数据",
                "icon": "bracket"
            }
        ];
    </script>
    <!-- PAGE_LIST_END -->

    <script>
        (function () {
            var grid = document.getElementById('pageGrid');
            var pageCountEl = document.getElementById('pageCount');
            var footerCountEl = document.getElementById('footerCount');

            var iconMap = {
                'bracket': '\u2774\u2775',
                'code': '\u2039/\u203A',
                'edit': '\u270E',
                'image': '\u25A3',
                'calc': '\u002B\u2212',
                'text': '\u00B6',
                'tool': '\u2699',
                'data': '\u2261',
                'default': '\u25C9'
            };

            function getIcon(iconKey) {
                return iconMap[iconKey] || iconMap['default'];
            }

            function renderCards(pages) {
                grid.innerHTML = '';

                if (!pages || pages.length === 0) {
                    grid.innerHTML =
                        '<div class="empty-state">' +
                        '<div class="empty-icon">&#128194;</div>' +
                        '<p>暂无工具页面</p>' +
                        '<p class="hint">将 HTML 文件放入 pages 目录，页面将自动出现在这里</p>' +
                        '</div>';
                    pageCountEl.textContent = '0';
                    footerCountEl.textContent = '0';
                    return;
                }

                pageCountEl.textContent = pages.length;
                footerCountEl.textContent = pages.length;

                var html = '';
                pages.forEach(function (page) {
                    var icon = getIcon(page.icon);
                    html +=
                        '<a class="page-card" href="pages/' + page.name + '">' +
                        '<div class="card-icon">' + icon + '</div>' +
                        '<div class="card-body">' +
                        '<div class="card-title">' + (page.title || page.name) + '</div>' +
                        '<div class="card-desc">' + (page.description || '') + '</div>' +
                        '</div>' +
                        '<span class="card-action">打开 <span class="arrow">&rarr;</span></span>' +
                        '</a>';
                });
                grid.innerHTML = html;
            }

            renderCards(PAGE_LIST);
        })();
    </script>
</body>

</html>
