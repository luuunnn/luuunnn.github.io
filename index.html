<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBN 万能网站</title>
    <meta name="description" content="LBN 万能网站 - 提供各种实用工具和资源的在线平台，帮助用户轻松访问和使用各种工具，提升工作效率和生活便利。">
    <meta name="keywords" content="LBN,万能网站,实用工具,在线平台,工作效率,生活便利">
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e8e8e8;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px 60px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 48px 0 40px;
        }

        .header .logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header .divider {
            width: 48px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin: 16px auto 0;
            opacity: 0.3;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 36px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .stats-bar span strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Grid */
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        /* Card */
        .page-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 22px 70px 22px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            border-left: 3px solid transparent;
            transition: border-left-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            position: relative;
        }

        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-left-color: var(--accent);
        }

        .page-card .card-name {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            transition: color 0.2s ease;
        }

        .page-card:hover .card-name {
            color: var(--accent);
        }

        .page-card .card-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: help;
            transition: color 0.2s ease;
        }

        .page-card:hover .card-description {
            color: var(--text);
        }

        .page-card .card-url {
            font-size: 12px;
            color: #c0c4cc;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            transition: color 0.2s ease;
        }

        .page-card:hover .card-url {
            color: #b0b4bc;
        }

        .page-card .card-action {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%) translateX(6px);
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        .page-card:hover .card-action {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .page-card .card-action .arrow {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .page-card:hover .card-action .arrow {
            transform: translateX(3px);
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .empty-state .hint {
            font-size: 12px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            padding: 80px 20px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 24px 16px 40px;
            }

            .header {
                padding: 32px 0 28px;
            }

            .header .logo {
                font-size: 28px;
            }

            .page-grid {
                grid-template-columns: 1fr;
            }

            .page-card .card-action {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">LBN Tools</div>
            <p class="subtitle">实用在线工具集</p>
            <div class="divider"></div>
            <div class="stats-bar" style="margin-top: 20px;">
                <span>共 <strong id="pageCount">-</strong> 个工具</span>
            </div>
        </header>

        <div class="page-grid" id="pageGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 LBN Tools
    </footer>

    <script>
        (function () {
            var grid = document.getElementById('pageGrid');
            var pageCountEl = document.getElementById('pageCount');
            var NS_PAGE = 'https://luuunnn.github.io/sitemap-ext';

            function renderCards(pages) {
                grid.innerHTML = '';

                if (!pages || pages.length === 0) {
                    grid.innerHTML =
                        '<div class="empty-state">' +
                        '<div class="empty-icon">&#128450;</div>' +
                        '<p>暂无工具页面</p>' +
                        '<p class="hint">在 pages/ 目录下添加 HTML 文件即可在此显示</p>' +
                        '</div>';
                    pageCountEl.textContent = '0';
                    return;
                }

                pageCountEl.textContent = pages.length;

                var html = '';
                pages.forEach(function (page) {
                    var descAttr = page.description ? ' title="' + page.description.replace(/"/g, '&quot;') + '"' : '';
                    var descHtml = page.description ? '<div class="card-description"' + descAttr + '>' + page.description + '</div>' : '';
                    html +=
                        '<a class="page-card" href="' + page.url + '">' +
                        '<div class="card-name">' + (page.name || '') + '</div>' +
                        descHtml +
                        '<span class="card-url">' + (page.url || '') + '</span>' +
                        '<span class="card-action">打开 <span class="arrow">&rarr;</span></span>' +
                        '</a>';
                });
                grid.innerHTML = html;
            }

            function renderError(msg) {
                grid.innerHTML =
                    '<div class="empty-state">' +
                    '<div class="empty-icon">&#9888;</div>' +
                    '<p>加载页面清单失败</p>' +
                    '<p class="hint">' + msg + '</p>' +
                    '<p class="hint" style="margin-top:8px;">请检查 sitemap.xml 是否存在且格式正确</p>' +
                    '</div>';
                pageCountEl.textContent = '-';
            }

            fetch('/sitemap.xml', { cache: 'no-cache' })
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                })
                .then(function (xmlText) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(xmlText, 'text/xml');

                    // 检查 XML 解析错误
                    var parseError = doc.querySelector('parsererror');
                    if (parseError) {
                        throw new Error('XML 解析失败');
                    }

                    var urlEls = doc.querySelectorAll('url');
                    var pages = [];
                    urlEls.forEach(function (urlEl) {
                        var locEl = urlEl.querySelector('loc');
                        var nameEls = urlEl.getElementsByTagNameNS(NS_PAGE, 'name');
                        var descEls = urlEl.getElementsByTagNameNS(NS_PAGE, 'description');

                        var fullUrl = locEl ? locEl.textContent.trim() : '';
                        // 从完整 URL 提取相对路径
                        var relUrl = fullUrl.replace(/^https?:\/\/[^\/]+/, '');

                        // 排除首页自身（relUrl 可能是 ""、"/" 或 "/index.html"）
                        if (relUrl === '' || relUrl === '/' || relUrl === '/index.html') return;

                        pages.push({
                            name: nameEls.length ? nameEls[0].textContent.trim() : '',
                            url: relUrl,
                            description: descEls.length ? descEls[0].textContent.trim() : ''
                        });
                    });

                    renderCards(pages);
                })
                .catch(function (err) {
                    renderError(err.message);
                });
        })();
    </script>
</body>

</html>
