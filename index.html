<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航 - LBN Tools</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e8e8e8;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px 60px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 48px 0 40px;
        }
        .header .logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .header .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .header .divider {
            width: 48px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin: 16px auto 0;
            opacity: 0.3;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 36px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .stats-bar span strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Grid */
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* Card */
        .page-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            border-left: 3px solid transparent;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            position: relative;
        }
        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-left-color: var(--accent);
        }

        .page-card .card-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }
        .page-card:hover .card-name {
            color: var(--accent);
        }

        .page-card .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            flex: 1;
        }

        .page-card .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2px;
        }

        .page-card .card-url {
            font-size: 11px;
            color: #c0c4cc;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        .page-card .card-action {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .page-card:hover .card-action {
            opacity: 1;
            transform: translateX(0);
        }
        .page-card .card-action .arrow {
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .page-card:hover .card-action .arrow {
            transform: translateX(3px);
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 14px;
            margin-bottom: 4px;
        }
        .empty-state .hint {
            font-size: 12px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            padding: 80px 20px;
        }
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 24px 16px 40px; }
            .header { padding: 32px 0 28px; }
            .header .logo { font-size: 28px; }
            .page-grid { grid-template-columns: 1fr; }
            .page-card .card-action { opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">LBN Tools</div>
            <p class="subtitle">实用在线工具集</p>
            <div class="divider"></div>
            <div class="stats-bar" style="margin-top: 20px;">
                <span>共 <strong id="pageCount">-</strong> 个工具</span>
            </div>
        </header>

        <div class="page-grid" id="pageGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 LBN Tools
    </footer>

    <script>
    (function() {
        var grid = document.getElementById('pageGrid');
        var pageCountEl = document.getElementById('pageCount');

        function renderCards(pages) {
            grid.innerHTML = '';

            if (!pages || pages.length === 0) {
                grid.innerHTML =
                    '<div class="empty-state">' +
                    '<div class="empty-icon">&#128450;</div>' +
                    '<p>暂无工具页面</p>' +
                    '<p class="hint">在 pages/sitemap.json 中添加页面即可在此显示</p>' +
                    '</div>';
                pageCountEl.textContent = '0';
                return;
            }

            pageCountEl.textContent = pages.length;

            var html = '';
            pages.forEach(function(page) {
                html +=
                    '<a class="page-card" href="' + page.url + '">' +
                    '<div class="card-name">' + (page.name || '') + '</div>' +
                    '<div class="card-desc">' + (page.description || '') + '</div>' +
                    '<div class="card-meta">' +
                    '<span class="card-url">' + (page.url || '') + '</span>' +
                    '<span class="card-action">打开 <span class="arrow">&rarr;</span></span>' +
                    '</div>' +
                    '</a>';
            });
            grid.innerHTML = html;
        }

        function renderError(msg) {
            grid.innerHTML =
                '<div class="empty-state">' +
                '<div class="empty-icon">&#9888;</div>' +
                '<p>加载页面清单失败</p>' +
                '<p class="hint">' + msg + '</p>' +
                '<p class="hint" style="margin-top:8px;">请检查 pages/sitemap.json 是否存在且格式正确</p>' +
                '</div>';
            pageCountEl.textContent = '-';
        }

        fetch('pages/sitemap.json', { cache: 'no-cache' })
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                if (!Array.isArray(data)) throw new Error('sitemap.json 应为数组格式');
                renderCards(data);
            })
            .catch(function(err) {
                renderError(err.message);
            });
    })();
    </script>
</body>
</html>
