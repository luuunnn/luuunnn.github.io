# 用于将静态内容部署到 GitHub Pages 的简易工作流
name: Deploy static content to Pages # 工作流名称，会显示在 GitHub Actions 标签页中

on: # 定义触发此工作流的事件
  # 当代码推送到默认分支时自动运行
  push: # 监听 push 事件
    branches: ["main"] # 只监听 main 分支的推送（你的主分支）

  # 允许从 GitHub Actions 标签页手动触发此工作流
  workflow_dispatch: # 手动触发事件，无需代码推送

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions: # 定义工作流运行时的权限范围
  contents: read # 允许读取仓库内容（拉取代码）
  pages: write # 允许写入 GitHub Pages 配置
  id-token: write # 允许获取 OIDC 令牌，用于身份验证（GitHub Pages 部署需要）

# 并发控制：同一时间只允许一个部署任务运行，跳过排队中的冗余任务。
# 但不会取消正在运行的任务，因为我们希望已开始的生产部署能够顺利完成。
concurrency: # 并发策略设置
  group: "pages" # 并发组名称，同组的任务会互相排队/取消
  cancel-in-progress: false # 不取消正在运行中的部署（确保安全）

jobs: # 定义工作流中的作业列表
  # 只有一个部署作业，因为本项目只需要部署静态文件
  deploy: # 作业名称，可自定义
    environment: # 指定部署的目标环境
      name: github-pages # 环境名称为 GitHub Pages
      url: ${{ steps.deployment.outputs.page_url }} # 部署完成后，动态获取网站的实际 URL
    runs-on: ubuntu-latest # 指定运行作业的虚拟环境为最新版 Ubuntu
    steps: # 作业中的执行步骤列表，按顺序执行
      - name: Checkout # 步骤1：检出代码
        uses: actions/checkout@v4 # 使用官方 checkout 动作，将仓库代码拉取到运行环境中

      - name: Generate sitemap.json # 步骤2：扫描 pages/ 目录自动生成站点地图
        run: |
          cd pages                                              # 进入 pages 目录
          echo "[" > sitemap.json                               # 写入 JSON 数组开头
          FIRST=true                                            # 标记第一个条目（控制逗号）
          for f in *.html; do                                   # 遍历所有 .html 文件
            [ ! -f "$f" ] && continue                           # 跳过不存在的文件（glob 无匹配时）
            echo "  Processing: $f"                             # 调试：输出正在处理的文件

            # 提取 <title> 标签内容（支持跨行场景）
            # sed 在 <title> 到 </title> 范围内做替换，head -1 取第一个匹配
            # tr -d '\r' 去除 Windows 换行符，最后 sed 去除首尾空白
            TITLE=$(sed -n '/<title>/,/<\/title>/{s/.*<title>//;s/<\/title>.*//;p}' "$f" | head -1 | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            echo "  Extracted title: [$TITLE]"                  # 调试：输出提取结果

            [ -z "$TITLE" ] && TITLE="$f"                       # 如果提取为空，用文件名兜底

            # 提取 <meta name="description" content="..."> 中的描述
            DESCRIPTION=$(perl -ne 'if (/<meta[^>]*\bname=["\x27]description["\x27][^>]*\bcontent=["\x27]([^"\x27]*)["\x27]/i) { print $1; exit } if (/<meta[^>]*\bcontent=["\x27]([^"\x27]*)["\x27][^>]*\bname=["\x27]description["\x27]/i) { print $1; exit }' "$f" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            echo "  Extracted description: [$DESCRIPTION]"

            # 转义 JSON 特殊字符：反斜杠 → 双反斜杠，双引号 → 反斜杠+双引号
            TITLE=$(printf '%s' "$TITLE" | sed 's/\\/\\\\/g; s/"/\\"/g')
            DESCRIPTION=$(printf '%s' "$DESCRIPTION" | sed 's/\\/\\\\/g; s/"/\\"/g')

            if [ "$FIRST" = true ]; then                        # 第一个条目不加逗号
              FIRST=false
            else
              echo "," >> sitemap.json                          # 后续条目前加逗号分隔
            fi

            # 写入当前条目
            printf '  {"name":"%s","url":"pages/%s","description":"%s"}' "$TITLE" "$f" "$DESCRIPTION" >> sitemap.json
          done
          echo "" >> sitemap.json                               # 换行
          echo "]" >> sitemap.json                              # 写入 JSON 数组结尾
          echo "Generated sitemap.json:"
          cat sitemap.json                                      # 输出最终结果便于排查

      - name: Setup Pages # 步骤3：配置 GitHub Pages
        uses: actions/configure-pages@v5 # 自动检测和配置 Pages 的构建方式

      - name: Upload artifact # 步骤4：上传静态站点文件作为构建产物
        uses: actions/upload-pages-artifact@v3 # 将网站文件打包上传
        with: # 传递参数给此动作
          # 上传整个仓库目录作为网站根目录
          path: "." # 指定当前目录（项目根目录）下的所有文件

      - name: Deploy to GitHub Pages # 步骤5：正式部署到 GitHub Pages
        id: deployment # 为这一步指定唯一 ID，方便在其他地方引用（如上面获取 page_url）
        uses: actions/deploy-pages@v5 # 使用官方的 GitHub Pages 部署动作，将产物发布上线
